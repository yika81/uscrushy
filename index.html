
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Reward</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 30px;
        }

        h1 {
            font-size: 32px;
            color: #111;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background: #00c853;
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .small {
            margin-top: 18px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop" alt="Smiling woman">

    <div class="content">
        <h1>Congratulations!</h1>

        <p>
            You may qualify for this exclusive limited-time reward.
            Click below to continue and check your eligibility now.
        </p>

        <a class="btn" href="https://vfgwh.bemobtrcks.com/go/d41c5084-ec9d-443e-9c5a-2a554f5ad6bc?cost={cost}&click_id={click_id}&campaign_id={campaign_id}&creative_id={creative_id}&category={category}&keyword={keywords}&referrer={referrer}&site_id={site_id}&format={format}&ip={ip}&geo={geo}&pricing_model={pricing_model}">
            CONTINUE
        </a>

        <div class="small">
            Limited spots available today.
        </div>
    </div>
</div>

</body>
</html>

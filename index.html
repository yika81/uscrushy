<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Messages Nearby</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
}

.container{
    max-width:450px;
    margin:auto;
    padding:20px;
}

.header{
    text-align:center;
    margin-top:20px;
}

.header h1{
    font-size:28px;
}

.sub{
    color:#bbbbbb;
    margin-top:10px;
}

.hero{
    width:100%;
    border-radius:20px;
    margin-top:20px;
}

.message{
    background:#1c1c1c;
    padding:14px;
    border-radius:14px;
    margin-top:12px;
}

.name{
    color:#ff2d55;
    font-weight:bold;
}

.cta{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:#ff2d55;
    color:white;
    font-size:20px;
    font-weight:bold;
    margin-top:25px;
    cursor:pointer;
}

.popup{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#1f1f1f;
    padding:10px 14px;
    border-radius:12px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🔥 3 Unread Messages</h1>
<div class="sub">Women near you are waiting for your reply 😘</div>
</div>

<img class="hero" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=900&auto=format&fit=crop">

<div class="message">
<span class="name">Jessica:</span>
Hey... are you ignoring me? 😘
</div>

<div class="message">
<span class="name">Amanda:</span>
I saw your profile... you look interesting 😉
</div>

<div class="message">
Typing...
</div>

<button class="cta" onclick="goOffer()">
See New Messages 🔥
</button>

</div>

<script>

function goOffer() {

window.location.href = "https://w24q8.bemobtrk.com/click";

}

setInterval(function(){

var names = ["Jessica","Amanda","Emma","Mia","Sophie"];

var popup = document.createElement("div");

popup.className = "popup";

popup.innerHTML = "💬 " + names[Math.floor(Math.random()*names.length)] + " is online now";

document.body.appendChild(popup);

setTimeout(function(){
popup.remove();
},3000);

},5000);

</script>

</body>
</html>

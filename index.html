<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Singles Online</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#f7f7f7;
    color:#222;
}

.container{
    max-width:420px;
    margin:auto;
    background:#fff;
    min-height:100vh;
}

.hero{
    width:100%;
    height:300px;
    object-fit:cover;
}

.content{
    padding:20px;
    text-align:center;
}

.badge{
    display:inline-block;
    background:#ffe6ee;
    color:#ff2d55;
    padding:8px 15px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
    margin-bottom:15px;
}

h1{
    font-size:30px;
    margin-bottom:10px;
}

.desc{
    color:#555;
    font-size:16px;
    line-height:1.5;
    margin-bottom:20px;
}

.cta{
    width:100%;
    border:none;
    background:#ff2d55;
    color:navy;
    padding:18px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.notice{
    margin-top:15px;
    font-size:14px;
    color:#666;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#999;
}
</style>
</head>

<body>

<div class="container">

<img class="hero"
src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
alt="Dating">

<div class="content">

<div class="badge">
● Members Online Now
</div>

<h1>Meet Local Singles</h1>

<div class="desc">
Browse active profiles and connect with people near you who are ready to chat.
</div>

<button class="cta" onclick="goOffer()">
View Profiles
</button>

<div class="notice">
Free registration • Mobile friendly
</div>

<div class="footer">
18+ Only
</div>

</div>
</div>

<script>
function goOffer(){
    window.location.href='https://trk.uscrushy.online/click';
}
</script>

</body>
</html>
